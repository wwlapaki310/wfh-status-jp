name: Issueから企業情報を反映してPRを作成

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-issue:
    if: contains(github.event.issue.labels.*.name, 'company-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Issue本文をパースしてデータ更新
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/parse-issue.js

      - name: Pull Requestを作成
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data: Issue #${{ github.event.issue.number }} の内容を反映"
          branch: "company-submission/issue-${{ github.event.issue.number }}"
          title: "[自動生成] Issue #${{ github.event.issue.number }} の企業情報を反映"
          body: |
            Issue #${{ github.event.issue.number }} で投稿された内容から自動生成されたPRです。
            マージ前に内容（出典URL・分類など）を確認してください。

            Closes #${{ github.event.issue.number }}
          labels: automated-pr

      - name: Issueにコメント
        if: steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `内容を確認し、Pull Request #${{ steps.cpr.outputs.pull-request-number }} を作成しました。メンテナーの確認後にマージされます。`
            });
